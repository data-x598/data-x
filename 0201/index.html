<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA-X Emergency Box</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #2d2d2d; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 2px solid #ed1c24; text-align: center; }
        h2 { color: #ed1c24; margin-bottom: 15px; }
        .info-row { text-align: left; background: #3d3d3d; padding: 10px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #ed1c24; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #3d3d3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ed1c24; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box" id="mainBox">
    <h2>DATA-X</h2>
    <form id="emergencyForm">
        <input type="text" id="ownerName" placeholder="Owner Name" required>
        <input type="tel" id="familyNumber" placeholder="Family Number" required>
        <input type="text" id="bloodInput" placeholder="Blood Group" required>
        <button type="submit" id="saveBtn">SAVE INFO</button>
    </form>
</div>

<script>
    const serial = window.location.pathname.split('/').filter(Boolean).pop() || "MAIN";
    const scriptURL = "https://script.google.com/macros/s/AKfycbyuy4PZxB5EGW7z5AUsURwH1dl6wznbGmRWcWwrLhOCvbfPgYi30wMH_ryNibsluW0Xbw/exec";

    // --- SMART DISPLAY LOGIC ---
    // Check if data is already in browser memory
    const savedData = localStorage.getItem('user_data_' + serial);
    
    if (savedData) {
        const user = JSON.parse(savedData);
        document.getElementById('mainBox').innerHTML = `
            <h2 style="color: #4CAF50;">LOCKED</h2>
            <p>Emergency Information for <b>${serial}</b></p>
            <div class="info-row"><b>Name:</b> ${user.name}</div>
            <div class="info-row"><b>Phone:</b> ${user.phone}</div>
            <div class="info-row"><b>Blood:</b> ${user.blood}</div>
            <p style="font-size: 12px; color: #888;">This info is locked to this device.</p>
        `;
    }

    // --- SAVE LOGIC ---
    document.getElementById('emergencyForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.innerText = "SAVING...";
        btn.disabled = true;

        const data = {
            id: serial,
            name: document.getElementById('ownerName').value,
            phone: document.getElementById('familyNumber').value,
            blood: document.getElementById('bloodInput').value
        };

        // 1. Send to Google Sheets
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        })
        .then(() => {
            // 2. ALSO Save in browser memory so it shows later
            localStorage.setItem('user_data_' + serial, JSON.stringify(data));
            alert("Success! Data saved for " + serial);
            location.reload();
        })
        .catch(() => {
            alert("Connection Error!");
            btn.disabled = false;
        });
    };
</script>
</body>
</html>
