<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA-X Emergency Box</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #2d2d2d; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 2px solid #ed1c24; text-align: center; }
        h2 { color: #ed1c24; margin: 0 0 15px 0; font-size: 28px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #3d3d3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ed1c24; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

<div class="box" id="mainBox">
    <h2>DATA-X</h2>
    <form id="emergencyForm">
        <input type="text" id="ownerName" placeholder="Owner Name" required>
        <input type="tel" id="familyNumber" placeholder="Family Number" required>
        <input type="text" id="bloodInput" placeholder="Blood Group (e.g. A+)" required>
        <button type="submit" id="saveBtn">SAVE INFO</button>
    </form>
</div>

<script>
    // 1. Get Serial from URL
    const path = window.location.pathname;
    const serial = path.split('/').filter(Boolean).pop() || "MAIN";
    
    // 2. YOUR GOOGLE SCRIPT URL (From your photo)
    const scriptURL = "https://script.google.com/macros/s/AKfycbyuy4PZxB5EGW7z5AUsURwH1dl6wznbGmRWcWwrLhOCvbfPgYi30wMH_ryNibsluW0Xbw/exec";

    // 3. Check if already registered
    if (localStorage.getItem('reg_' + serial)) {
        document.getElementById('mainBox').innerHTML = "<h2>LOCKED</h2><p>Data for serial <b>" + serial + "</b> is already saved.</p>";
    }

    // 4. Submit Function
    document.getElementById('emergencyForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.innerText = "SAVING...";
        btn.disabled = true;

        const data = {
            id: serial,
            name: document.getElementById('ownerName').value,
            phone: document.getElementById('familyNumber').value,
            blood: document.getElementById('bloodInput').value
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        })
        .then(() => {
            localStorage.setItem('reg_' + serial, 'true');
            alert("Success! Data saved for " + serial);
            location.reload();
        })
        .catch(() => {
            alert("Error! Check internet.");
            btn.innerText = "SAVE INFO";
            btn.disabled = false;
        });
    };
</script>

</body>
</html>
