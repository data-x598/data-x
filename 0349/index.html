<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA-X</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #2d2d2d; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 2px solid #ed1c24; text-align: center; }
        .info-row { text-align: left; background: #3d3d3d; padding: 10px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #ed1c24; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #3d3d3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ed1c24; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box" id="mainBox">Connecting to System...</div>
<script>
    const serial = window.location.pathname.split('/').filter(Boolean).pop() || "MAIN";
    
    // Aapka Latest URL (Image e413661b se)
    const scriptURL = "https://script.google.com/macros/s/AKfycbzadZtDak2Dudxu9mGSmmvTokxUhbpKep-bhxI1V6k2Y8Z65Nq9u3E7uQvBAnA356l6/exec";

    fetch(`${scriptURL}?id=${serial}`)
    .then(res => res.json())
    .then(data => {
        if (data.status === "LOCKED") {
            document.getElementById('mainBox').innerHTML = `
                <h2 style="color: #ed1c24;">DATA-X LOCKED</h2>
                <div class="info-row"><b>Name:</b> ${data.name}</div>
                <div class="info-row"><b>Phone:</b> ${data.phone}</div>
                <div class="info-row"><b>Blood:</b> ${data.blood}</div>`;
        } else {
            document.getElementById('mainBox').innerHTML = `
                <h2>Registration</h2>
                <form id="regForm">
                    <input type="text" id="n" placeholder="Name" required>
                    <input type="tel" id="p" placeholder="Phone" required>
                    <input type="text" id="b" placeholder="Blood Group" required>
                    <button type="submit" id="btn">SAVE INFO</button>
                </form>`;
            document.getElementById('regForm').onsubmit = function(e) {
                e.preventDefault();
                document.getElementById('btn').innerText = "SAVING...";
                const payload = { id: serial, name: document.getElementById('n').value, phone: document.getElementById('p').value, blood: document.getElementById('b').value };
                fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
                .then(() => { alert("Success!"); location.reload(); });
            };
        }
    }).catch(() => { 
        document.getElementById('mainBox').innerHTML = "Connection Error! <br><small>Make sure Script is 'Anyone'</small>"; 
    });
</script>
</body>
</html>
